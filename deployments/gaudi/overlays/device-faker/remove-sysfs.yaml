apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: intel-gaudi-resource-driver-kubelet-plugin
  namespace: intel-gaudi-resource-driver
spec:
  template:
    spec:
      containers:
      - name: kubelet-plugin
        volumeMounts:
        - name: sysfs
          mountPath: /sys
          $patch: delete
        - name: etc-habanalabs
          mountPath: /etc/habanalabs
          $patch: delete
      volumes:
      - name: sysfs
        $patch: delete
      - name: etc-habanalabs
        $patch: delete
