apiVersion: resource.k8s.io/v1
kind: ResourceClaimTemplate
metadata:
  name: multi-gpu-claim
  namespace: intel-gpu-resource-driver
spec:
  spec:
    devices:
      requests:
      - name: gpu
        exactly:
          deviceClassName: gpu.intel.com
          count: 2
---
apiVersion: v1
kind: Pod
metadata:
  name: multi-gpu-test
  namespace: intel-gpu-resource-driver
spec:
  restartPolicy: Never
  containers:
  - name: with-resource
    image: registry.k8s.io/e2e-test-images/busybox:1.29-2
    command: ["sh", "-c", "echo 'Testing multiple GPU allocation' && ls -la /dev/dri/ && COUNT=$(ls -1 /dev/dri/card* 2>/dev/null | wc -l) && echo \"Found $COUNT GPU card devices\" && test $COUNT -ge 2 && echo 'SUCCESS: Multiple GPUs allocated' || exit 1"]
    resources:
      claims:
      - name: resource
  resourceClaims:
  - name: resource
    resourceClaimTemplateName: multi-gpu-claim
