name: Publish device-faker image

on:
  push:
    tags:
      - 'device-faker-v*'

permissions:
  contents: read

env:
  repo: ghcr.io/intel/intel-resource-drivers-for-kubernetes

jobs:
  build-and-push:
    permissions:
      contents: read
      id-token: write
      packages: write
    runs-on: ubuntu-24.04

    steps:
    - name: Check out code
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

    - name: Install cosign
      uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

    - name: Docker login
      if: ${{ github.event_name == 'push' }}
      run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

    - name: Prepare for build
      run: make vendor

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
      with:
        driver-opts: |
          "env.http_proxy=${{ vars.HTTP_PROXY }}"
          "env.https_proxy=${{ vars.HTTPS_PROXY }}"
          "env.no_proxy=${{ vars.NO_PROXY }}"

    - name: Parse image tag from GitHub ref
      run: echo IMAGE_TAG=${GITHUB_REF_NAME/device-faker-/} >> $GITHUB_ENV

    - name: Build and push image
      id: build_and_push
      uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
      with:
        context: ./
        file: ./Dockerfile.device-faker
        push: ${{ github.event_name == 'push' }}
        tags: ${{ env.repo }}/intel-device-faker:${{ env.IMAGE_TAG }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        build-args: |
          http_proxy=${{ vars.HTTP_PROXY }}
          https_proxy=${{ vars.HTTPS_PROXY }}
          no_proxy=${{ vars.NO_PROXY }}

    - name: Sign image
      if: ${{ github.event_name == 'push' }}
      env:
        DIGEST: ${{ steps.build_and_push.outputs.digest }}
      run: cosign sign --yes ${{ env.repo }}/intel-device-faker:${{ env.IMAGE_TAG }}@${{ env.DIGEST }}
