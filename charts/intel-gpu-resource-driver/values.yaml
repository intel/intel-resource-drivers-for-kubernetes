# Default values for intel-gpu-resource-driver.
nameOverride: ""
fullnameOverride: ""
selectorLabelsOverride: {}

# To enable DRA resources allocation as extended resources. K8s v1.33-v1.36 requires FeatureGate.
# See https://github.com/kubernetes/enhancements/tree/master/keps/sig-scheduling/5004-dra-extended-resource .
enableDRAExtendedResources: false
extendedResourceName: intel.com/gpu

imagePullSecrets: []
image:
  repository: ghcr.io/intel/intel-resource-drivers-for-kubernetes
  name: intel-gpu-resource-driver
  pullPolicy: IfNotPresent
  tag: "v0.10.1"

serviceAccount:
  create: true
  annotations: {}
  name: ""
  automount: true

openshift:
  enabled: false
  version: "4.21"
  sccName: intel-gpu-resource-driver

kubeletPlugin:
  healthcheckPort: 51516  # gRPC health check port. Set to -1 to disable.
  podAnnotations: {}
  # Custom nodeSelector. Used only when nodeFeatureRules.enabled=false.
  nodeSelector: {}
  # When health monitoring is disabled, set this to true for GPU driver to query hardware details directly from devices.
  # With health monitoring enabled, hardware details come from xpumd amd privileged mode is not required.
  privileged: false


  # Health monitoring configuration
  healthMonitoring:
    # Provide -m flag to kubelet-plugin to actively monitor GPU health via xpumd.
    enabled: true
    # Only critical errors should result in tainting the device and evicting Pods from using the GPU.
    ignoreHealthWarning: true


  tolerations:
    - key: node-role.kubernetes.io/master
      operator: Exists
      effect: NoSchedule
    - key: node-role.kubernetes.io/control-plane
      operator: Exists
      effect: NoSchedule
      # Refer to the official documentation for Node Feature Discovery (NFD)
      # regarding node tainting:
      # https://nfd.sigs.k8s.io/usage/customization-guide#node-tainting
    - key: "node.kubernetes.io/gpu"
      operator: "Exists"
      effect: "NoSchedule"
  affinity: {}

cdi:
  staticPath: /etc/cdi
  dynamicPath: /var/run/cdi

# Requires a running NFD in the cluster.
# Deploy rules that applies to nodes with Intel GPU (intel.feature.node.kubernetes.io/gpu=true).
nodeFeatureRules:
  enabled: false

# Install NFD as a dependency. Enable only if NFD is not already present in the cluster.
# This is not creating labels on nodes.
nfd:
  enabled: false
  nameOverride: intel-gpu-nfd
  enableNodeFeatureApi: true
