# Default values for intel-qat-resource-driver.
nameOverride: ""
fullnameOverride: ""
selectorLabelsOverride: {}

# To enable DRA resources allocation as extended resources. K8s v1.33-v1.36 requires FeatureGate.
# See https://github.com/kubernetes/enhancements/tree/master/keps/sig-scheduling/5004-dra-extended-resource .
enableDRAExtendedResources: false
extendedResourceName: intel.com/qat

imagePullSecrets: []
image:
  repository: ghcr.io/intel/intel-resource-drivers-for-kubernetes
  name: intel-qat-resource-driver
  pullPolicy: IfNotPresent
  tag: "v0.4.2"

serviceAccount:
  create: true
  annotations: {}
  name: ""
  automount: true

openshift:
  enabled: false
  version: "4.21"
  sccName: intel-qat-resource-driver

kubeletPlugin:
  podAnnotations: {}
  nodeSelector: {}
    # Label used when nfd.enabled is true.
    # Changes to this are ignored when .Values.nodeFeatureRules.enabled or .Values.nfd.enabled .
    #feature.node.kubernetes.io/qat: "true"
  tolerations:
    - key: node-role.kubernetes.io/master
      operator: Exists
      effect: NoSchedule
    - key: node-role.kubernetes.io/control-plane
      operator: Exists
      effect: NoSchedule
      # Refer to the official documentation for Node Feature Discovery (NFD)
      # regarding node tainting:
      # https://nfd.sigs.k8s.io/usage/customization-guide#node-tainting
    - key: "node.kubernetes.io/qat"
      operator: "Exists"
      effect: "NoSchedule"
  affinity: {}

cdi:
  staticPath: /etc/cdi
  dynamicPath: /var/run/cdi

# Requires a running NFD in the cluster.
# Deploy rules that applies to nodes with Intel QAT (intel.feature.node.kubernetes.io/qat=true).
nodeFeatureRules:
  enabled: false

# Install NFD as a dependency. Enable only if NFD is not already present in the cluster.
# This is not creating labels on nodes.
nfd:
  enabled: false
  nameOverride: intel-qat-nfd
  # TODO: this deprecated NFD option will be replaced in NFD v0.17 with "featureGates.NodeFeatureAPI" (added in v0.16):
  # https://kubernetes-sigs.github.io/node-feature-discovery/v0.16/deployment/helm.html#general-parameters
  enableNodeFeatureApi: true
